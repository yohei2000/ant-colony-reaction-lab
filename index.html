<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>蟻の群れリアクションラボ 3D</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <div id="world3d" aria-label="蟻の群れの3Dシミュレーション"></div>

      <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
        <div class="loading-box">
          <strong>Loading</strong>
          <span id="loadingLabel">renderer</span>
          <div class="loading-track" aria-hidden="true">
            <span id="loadingBar"></span>
          </div>
        </div>
      </div>

      <div id="errorPanel" class="error-panel" role="alert" hidden>
        <strong>WebGL error</strong>
        <span id="errorMessage">This device cannot start the 3D renderer.</span>
      </div>

      <aside id="debugPanel" class="debug-panel" aria-label="debug metrics" hidden>
        <div class="debug-row">
          <span>quality</span>
          <select id="qualitySelect">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </div>
        <pre id="debugMetrics">waiting</pre>
      </aside>

      <header class="topbar">
        <div class="title-block">
          <span class="title-mark" aria-hidden="true"></span>
          <div>
            <strong>蟻の群れリアクションラボ 3D</strong>
            <small id="activeToolLabel">観察</small>
          </div>
        </div>
        <div class="quick-actions">
          <button id="pauseBtn" class="icon-button" type="button" title="一時停止" aria-label="一時停止">
            <span class="pause-icon" aria-hidden="true"></span>
          </button>
          <button id="resetBtn" class="icon-button" type="button" title="再生成" aria-label="再生成">
            <span class="reset-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section class="stats-strip" aria-label="群れの状態">
        <div>
          <span>探索</span>
          <strong id="statExplore">0</strong>
        </div>
        <div>
          <span>避難</span>
          <strong id="statAlert">0</strong>
        </div>
        <div>
          <span>救助</span>
          <strong id="statRescue">0</strong>
        </div>
        <div>
          <span>搬入</span>
          <strong id="statFood">0</strong>
        </div>
      </section>

      <section id="colonyPanel" class="colony-panel" aria-label="コロニー管理">
        <div class="colony-metrics">
          <div>
            <span>食料</span>
            <strong id="colonyFood">0</strong>
          </div>
          <div>
            <span>蟻</span>
            <strong id="colonyAnts">0</strong>
          </div>
          <div>
            <span>食料/秒</span>
            <strong id="colonyFoodRate">0</strong>
          </div>
          <div>
            <span>巣Lv</span>
            <strong id="colonyNestLevel">1</strong>
          </div>
        </div>

        <div class="colony-tabs" role="tablist" aria-label="コロニー操作">
          <button class="colony-tab active" type="button" data-colony-tab="growth">成長</button>
          <button class="colony-tab" type="button" data-colony-tab="upgrades">強化</button>
          <button class="colony-tab" type="button" data-colony-tab="expedition">遠征</button>
        </div>

        <div id="colonyTab-growth" class="colony-tab-panel active">
          <div class="colony-readout">
            <span>領土 <strong id="colonyTerritory">0</strong></span>
            <span>敵脅威 <strong id="colonyThreat">0</strong></span>
            <span>兵隊 <strong id="colonySoldiers">0</strong></span>
            <span>負傷 <strong id="colonyWounded">0</strong></span>
          </div>
          <button id="nestExpandBtn" class="colony-action" type="button">
            <strong>巣を拡張</strong>
            <span id="nestExpandCost">cost 0</span>
          </button>
        </div>

        <div id="colonyTab-upgrades" class="colony-tab-panel">
          <button class="upgrade-button" type="button" data-upgrade="soldierTraining">
            <strong>Soldier Training</strong>
            <span></span>
          </button>
          <button class="upgrade-button" type="button" data-upgrade="mandibleStrength">
            <strong>Mandible Strength</strong>
            <span></span>
          </button>
          <button class="upgrade-button" type="button" data-upgrade="nestGuard">
            <strong>Nest Guard</strong>
            <span></span>
          </button>
          <button class="upgrade-button" type="button" data-upgrade="tacticalPheromone">
            <strong>Tactical Pheromone</strong>
            <span></span>
          </button>
        </div>

        <div id="colonyTab-expedition" class="colony-tab-panel">
          <div class="expedition-controls">
            <label>
              <span>敵</span>
              <select id="expeditionEnemy"></select>
            </label>
            <label>
              <span>出撃</span>
              <input id="expeditionSoldiers" type="range" min="1" max="1" value="1" step="1" />
              <output id="expeditionSoldiersValue">1</output>
            </label>
            <label>
              <span>戦術</span>
              <select id="expeditionTactic">
                <option value="careful">慎重</option>
                <option value="standard">標準</option>
                <option value="assault">強襲</option>
              </select>
            </label>
          </div>
          <div class="battle-summary">
            <span>勝率 <strong id="battleWinChance">0%</strong></span>
            <span>自軍 <strong id="battlePower">0</strong></span>
            <span>敵 <strong id="battleEnemyPower">0</strong></span>
            <span>報酬 <strong id="battleReward">0</strong></span>
            <span>損害 <strong id="battleLoss">0</strong></span>
            <span>待機 <strong id="battleCooldown">ready</strong></span>
          </div>
          <button id="expeditionStartBtn" class="colony-action primary" type="button">遠征開始</button>
          <ol id="battleLog" class="battle-log" aria-label="戦闘ログ"></ol>
        </div>
      </section>

      <div id="battleToast" class="battle-toast" role="status" aria-live="polite" hidden></div>

      <section class="inspector-panel" aria-label="個体情報">
        <div id="inspector" class="inspector">
          <span class="muted">個体未選択</span>
        </div>
        <div class="control-row">
          <label>
            <span>表示</span>
            <input id="antCount" type="range" min="80" max="280" value="170" step="10" />
            <output id="antCountValue">170</output>
          </label>
          <label>
            <span>刺激</span>
            <input id="intensity" type="range" min="1" max="5" value="3" step="1" />
            <output id="intensityValue">3</output>
          </label>
        </div>
      </section>

      <nav class="toolbelt" aria-label="操作ツール">
        <button class="tool-button active" type="button" data-tool="inspect" data-label="観察" title="観察" aria-label="観察">
          <span class="tool-icon inspect-icon" aria-hidden="true"></span>
          <span>観察</span>
        </button>
        <button class="tool-button" type="button" data-tool="water" data-label="水" title="水" aria-label="水">
          <span class="tool-icon water-icon" aria-hidden="true"></span>
          <span>水</span>
        </button>
        <button class="tool-button" type="button" data-tool="stone" data-label="落下物" title="落下物" aria-label="落下物">
          <span class="tool-icon stone-icon" aria-hidden="true"></span>
          <span>物</span>
        </button>
        <button class="tool-button" type="button" data-tool="food" data-label="餌" title="餌" aria-label="餌">
          <span class="tool-icon food-icon" aria-hidden="true"></span>
          <span>餌</span>
        </button>
        <button class="tool-button" type="button" data-tool="branch" data-label="枝" title="枝" aria-label="枝">
          <span class="tool-icon branch-icon" aria-hidden="true"></span>
          <span>枝</span>
        </button>
        <button class="tool-button" type="button" data-tool="erase" data-label="消去" title="消去" aria-label="消去">
          <span class="tool-icon eraser-icon" aria-hidden="true"></span>
          <span>消す</span>
        </button>
      </nav>
    </main>

    <script type="module" src="./src/simulation.js"></script>
  </body>
</html>
